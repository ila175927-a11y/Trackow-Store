<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trackow Shop PRO MAX</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<header>
<h1>Trackow Shop PRO MAX</h1>

<div>
<button onclick="openCart()">🛒 <span id="cartCount">0</span></button>
<button onclick="openAdmin()">⚙️</button>
</div>
</header>

<section class="filters">
<button onclick="filter('all')">Все</button>
<button onclick="filter('hoodie')">Худи</button>
<button onclick="filter('tshirt')">Футболки</button>
<button onclick="filter('jeans')">Джинсы</button>
</section>

<section id="products"></section>

<div id="cart" class="modal">
<div class="box">
<h2>Корзина</h2>

<div id="cartItems"></div>
<h3 id="total">0€</h3>

<button onclick="checkout()">Оформить в Telegram</button>
<button onclick="closeCart()">Закрыть</button>
</div>
</div>

<div id="admin" class="modal">
<div class="box">

<h2>Админ панель</h2>

<div id="loginBox">
<input id="pass" placeholder="Пароль">
<button onclick="login()">Войти</button>
</div>

<div id="adminPanel" style="display:none;">

<input id="name" placeholder="Название">
<input id="price" placeholder="Цена">
<input id="image" placeholder="Фото URL">

<select id="category">
<option value="hoodie">Худи</option>
<option value="tshirt">Футболка</option>
<option value="jeans">Джинсы</option>
</select>

<button onclick="addProduct()">Добавить</button>

<h3>Дизайн</h3>
<input id="bg" placeholder="Фон">
<input id="color" placeholder="Цвет текста">
<button onclick="applyStyle()">Применить</button>

</div>

<button onclick="closeAdmin()">Закрыть</button>
</div>
</div>

<script src="script.js"></script>
</body>
</html>
